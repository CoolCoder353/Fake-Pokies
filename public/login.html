<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Lucky Pokies</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <style>
        :root {
            --primary-gold: #FFD700;
            --primary-dark: #1a1a2e;
            --primary-purple: #6f42c1;
        }

        body {
            background: linear-gradient(135deg, var(--primary-dark) 0%, #2d2d44 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 2px solid var(--primary-gold);
            border-radius: 20px;
            padding: 50px 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-header i {
            font-size: 3rem;
            color: var(--primary-gold);
            margin-bottom: 15px;
            display: block;
        }

        .login-header h1 {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary-gold);
            margin-bottom: 10px;
        }

        .login-header p {
            color: #b0b0b0;
            font-size: 0.95rem;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            color: #fff;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--primary-gold);
            color: #fff;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        .form-control::placeholder {
            color: #888;
        }

        .form-label {
            color: var(--primary-gold);
            font-weight: 600;
            margin-bottom: 8px;
        }

        .btn-login {
            background: linear-gradient(135deg, var(--primary-purple), var(--primary-gold));
            border: none;
            color: white;
            padding: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            width: 100%;
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
            color: white;
        }

        .btn-login:active {
            transform: translateY(-1px);
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .form-check-input {
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--primary-gold);
            cursor: pointer;
        }

        .form-check-input:checked {
            background-color: var(--primary-gold);
            border-color: var(--primary-gold);
        }

        .form-check-label {
            color: #b0b0b0;
            cursor: pointer;
            margin-left: 8px;
        }

        .forgot-link {
            color: var(--primary-gold);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .forgot-link:hover {
            color: #ffc700;
            text-decoration: underline;
        }

        .signup-link {
            text-align: center;
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid rgba(255, 215, 0, 0.2);
        }

        .signup-link p {
            color: #b0b0b0;
            margin-bottom: 0;
        }

        .signup-link a {
            color: var(--primary-gold);
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .signup-link a:hover {
            color: #ffc700;
        }

        .error-message {
            background: rgba(220, 53, 69, 0.2);
            border: 1px solid #dc3545;
            color: #ff6b6b;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .success-message {
            background: rgba(40, 167, 69, 0.2);
            border: 1px solid #28a745;
            color: #51cf66;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .back-home {
            position: fixed;
            top: 20px;
            left: 20px;
        }

        .back-home a {
            color: var(--primary-gold);
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .back-home a:hover {
            color: #ffc700;
        }
    </style>
</head>

<body>
    <div class="back-home">
        <a href="index.html"><i class="fas fa-arrow-left"></i> Back Home</a>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <i class="fas fa-sign-in-alt"></i>
                <h1>Welcome Back</h1>
                <p>Sign in to your Lucky Pokies account</p>
            </div>

            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>

            <form id="loginForm">
                <div class="mb-3">
                    <label for="email" class="form-label">Username</label>
                    <input type="text" class="form-control" id="email" placeholder="Enter your username" required>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" placeholder="Enter your password"
                        required>
                </div>

                <div class="remember-forgot">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="remember" name="remember">
                        <label class="form-check-label" for="remember">Remember me</label>
                    </div>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-login">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>

            <div class="signup-link">
                <p>Don't have an account? <a href="register.html">Create one now</a></p>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script>
        $('#loginForm').on('submit', function (e) {
            e.preventDefault();

            let username = $('#email').val();
            let password = $('#password').val();

            $.ajax({
                url: '/auth/login',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ username: username, password: password }),
                success: function (response) {
                    $('#errorMessage').hide();
                    $('#successMessage').text(response.message).show();

                    if ($('#remember').is(':checked')) {
                        localStorage.setItem('user', JSON.stringify(response.user));
                    } else {
                        sessionStorage.setItem('user', JSON.stringify(response.user));
                    }

                    setTimeout(() => {
                        window.location.href = '/pokie_machine.html';
                    }, 1500);
                },
                error: function (xhr) {
                    let errorResponse = xhr.responseJSON;
                    $('#successMessage').hide();
                    $('#errorMessage').text(errorResponse.message).show();
                }
            });
        });
    </script>
</body>

</html>
