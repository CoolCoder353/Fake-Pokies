<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Lucky Pokies</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <style>
        :root {
            --primary-gold: #FFD700;
            --primary-dark: #1a1a2e;
            --primary-purple: #6f42c1;
        }

        body {
            background: linear-gradient(135deg, var(--primary-dark) 0%, #2d2d44 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .register-container {
            width: 100%;
            max-width: 500px;
        }

        .register-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 2px solid var(--primary-gold);
            border-radius: 20px;
            padding: 50px 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .register-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .register-header i {
            font-size: 3rem;
            color: var(--primary-gold);
            margin-bottom: 15px;
            display: block;
        }

        .register-header h1 {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary-gold);
            margin-bottom: 10px;
        }

        .register-header p {
            color: #b0b0b0;
            font-size: 0.95rem;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            color: #fff;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--primary-gold);
            color: #fff;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        .form-control::placeholder {
            color: #888;
        }

        .form-label {
            color: var(--primary-gold);
            font-weight: 600;
            margin-bottom: 8px;
        }

        .btn-register {
            background: linear-gradient(135deg, var(--primary-purple), var(--primary-gold));
            border: none;
            color: white;
            padding: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            width: 100%;
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        .btn-register:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
            color: white;
        }

        .btn-register:active {
            transform: translateY(-1px);
        }

        .form-check-input {
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--primary-gold);
            cursor: pointer;
        }

        .form-check-input:checked {
            background-color: var(--primary-gold);
            border-color: var(--primary-gold);
        }

        .form-check-label {
            color: #b0b0b0;
            cursor: pointer;
            margin-left: 8px;
            font-size: 0.9rem;
        }

        .form-text {
            color: #888;
            font-size: 0.85rem;
            margin-top: -15px;
            margin-bottom: 15px;
        }

        .login-link {
            text-align: center;
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid rgba(255, 215, 0, 0.2);
        }

        .login-link p {
            color: #b0b0b0;
            margin-bottom: 0;
        }

        .login-link a {
            color: var(--primary-gold);
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .login-link a:hover {
            color: #ffc700;
        }

        .error-message {
            background: rgba(220, 53, 69, 0.2);
            border: 1px solid #dc3545;
            color: #ff6b6b;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .success-message {
            background: rgba(40, 167, 69, 0.2);
            border: 1px solid #28a745;
            color: #51cf66;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .back-home {
            position: fixed;
            top: 20px;
            left: 20px;
        }

        .back-home a {
            color: var(--primary-gold);
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .back-home a:hover {
            color: #ffc700;
        }

        .password-strength {
            height: 5px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        .password-strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s ease;
        }
    </style>
</head>

<body>
    <div class="back-home">
        <a href="index.html"><i class="fas fa-arrow-left"></i> Back Home</a>
    </div>

    <div class="register-container">
        <div class="register-card">
            <div class="register-header">
                <i class="fas fa-user-plus"></i>
                <h1>Join Us Today</h1>
                <p>Create your Lucky Pokies account</p>
            </div>

            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>

            <form id="registerForm">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" placeholder="Choose a username" required>
                    <small class="form-text">3-20 characters, alphanumeric only</small>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" placeholder="Create a strong password"
                        required>
                    <div class="password-strength">
                        <div class="password-strength-bar" id="strengthBar"></div>
                    </div>
                    <small class="form-text">At least 8 characters with uppercase, lowercase, and numbers</small>
                </div>

                <div class="mb-3">
                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                    <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm your password"
                        required>
                </div>

                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="responsible">
                    <label class="form-check-label" for="responsible">
                        I confirm I am 18+ and will play responsibly on this fake website. This is a demo and not a real
                        gambling platform.
                    </label>
                </div>

                <button type="submit" class="btn btn-register">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>

            <div class="login-link">
                <p>Already have an account? <a href="login.html">Sign in here</a></p>
            </div>
        </div>
        <footer class="text-center text-white py-5">
            This is a demo site for educational purposes only and not a real gambling platform.
        </footer>
    </div>


    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script>
        $(document).ready(function () {
            $('#registerForm').on('submit', function (e) {
                e.preventDefault();

                let username = $('#username').val();
                let password = $('#password').val();

                $.ajax({
                    url: '/auth/register',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({
                        username: username,
                        password: password
                    }),
                    success: function (response) {
                        $('#successMessage').text(response.message).show();
                        $('#errorMessage').hide();
                        setTimeout(() => {
                            window.location.href = '/login.html';
                        }, 2000);
                    },
                    error: function (xhr) {
                        let errorMsg = xhr.responseJSON ? xhr.responseJSON.error : 'An error occurred';
                        $('#errorMessage').text(errorMsg).show();
                        $('#successMessage').hide();
                    }
                });
            });
        });

        function evaluatePasswordStrength(password) {
            let strength = 0;
            if (password.length >= 8) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[a-z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;

            return strength;
        }

        $('#password').on('input', function () {
            let password = $(this).val();
            let strength = evaluatePasswordStrength(password);
            let strengthBar = $('#strengthBar');

            switch (strength) {
                case 0:
                case 1:
                    strengthBar.css('width', '20%').css('background', '#dc3545');
                    break;
                case 2:
                    strengthBar.css('width', '40%').css('background', '#ffc107');
                    break;
                case 3:
                    strengthBar.css('width', '60%').css('background', '#28a745');
                    break;
                case 4:
                    strengthBar.css('width', '80%').css('background', '#28a745');
                    break;
                case 5:
                    strengthBar.css('width', '100%').css('background', '#28a745');
                    break;
            }
        });
    </script>
</body>

</html>
